<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Escolar</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    .container { margin-top: 100px; }
    button { padding: 15px 25px; margin: 10px; border: none; border-radius: 10px; background: #007BFF; color: white; cursor: pointer; }
    button:hover { background: #0056b3; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="home" class="container">
  <h1>Bem-vindo ao Bot Escolar</h1>
  <p>Você é:</p>
  <button onclick="mostrarAluno()">Aluno</button>
  <button onclick="mostrarResponsavel()">Responsável</button>
</div>

<div id="aluno" class="container hidden">
  <h2>Área do Aluno</h2>
  <p>O que você precisa?</p>
  <button onclick="resposta('Suas notas estão disponíveis no portal escolar.')">Ver Notas</button>
  <button onclick="resposta('Hoje você terá Matemática, Português e História.')">Aulas de Hoje</button>
  <button onclick="resposta('Sim, haverá aula normalmente hoje.')">Haverá aula hoje?</button>
  <br><br>
  <button onclick="voltar()">Voltar</button>
</div>

<div id="responsavel" class="container hidden">
  <h2>Área do Responsável</h2>
  <p>O que deseja?</p>
  <button onclick="resposta('Horários disponíveis: 10h, 14h e 16h.')">Marcar horário com pedagoga</button>
  <button onclick="resposta('Seu filho está participando bem das aulas.')">Como está na sala?</button>
  <button onclick="resposta('As notas estão acima da média.')">Ver notas</button>
  <br><br>
  <button onclick="voltar()">Voltar</button>
</div>

<div id="resposta" class="container hidden">
  <h2>Resposta</h2>
  <p id="texto"></p>
  <button onclick="voltarInicio()">Voltar ao início</button>
</div>

<script>
function mostrarAluno() {
  document.getElementById('home').classList.add('hidden');
  document.getElementById('aluno').classList.remove('hidden');
}

function mostrarResponsavel() {
  document.getElementById('home').classList.add('hidden');
  document.getElementById('responsavel').classList.remove('hidden');
}

function resposta(msg) {
  document.getElementById('aluno').classList.add('hidden');
  document.getElementById('responsavel').classList.add('hidden');
  document.getElementById('resposta').classList.remove('hidden');
  document.getElementById('texto').innerText = msg;
}

function voltar() {
  document.getElementById('aluno').classList.add('hidden');
  document.getElementById('responsavel').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}

function voltarInicio() {
  document.getElementById('resposta').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}
</script>

</body>
</html>
